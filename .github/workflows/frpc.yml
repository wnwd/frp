name: FRPC
on:
  push:
    tags:    
      - 'v*'
  workflow_dispatch:
env:
  FRP_VERSION:
jobs:
  frpc-docker-action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Read current versoon
        run: |
          echo FRP_VERSION=$(cat versions.env | tr -d 'v') >> $GITHUB_ENV
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.MY_GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: frpc
          platforms: linux/amd64,linux/arm64,linux/arm/v6,linux/arm/v7
          push: true
          build-args: FRP_VERSION=${{ env.FRP_VERSION }}
          tags: |
            ${{ github.repository }}c::${{ env.FRP_VERSION }}
            ghcr.io/${{ github.repository }}c:${{ env.FRP_VERSION }}
            ${{ github.repository }}c:latest
            ghcr.io/${{ github.repository }}c:latest